<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Match Prediction</title><link rel="stylesheet" href="styles.css"></head><body><header class="hero"><img src="assets/logo.jpg" alt="Company logo"><div><p class="eyebrow">Public Prediction Microsite</p><h1>Predict the Match Results</h1><p>Choose a match, enter your prediction, and submit. All timings are Bangladesh Time.</p></div></header><main><section class="panel"><div class="toolbar"><input id="search" placeholder="Search team, venue, match no..."><select id="stageFilter"><option value="">All stages</option></select></div><div id="matches" class="grid"></div></section></main><div id="modal" class="modal hidden"><form id="predictionForm" class="modal-card"><button type="button" class="close" id="closeModal">×</button><h2 id="modalTitle">Prediction</h2><p id="modalMeta"></p><input type="hidden" id="matchNo"><label>Your name<input id="name" required maxlength="80"></label><label>Email / phone<input id="contact" required maxlength="120"></label><div class="score-row"><label>Team 1 score<input id="score1" type="number" min="0" max="99" required></label><label>Team 2 score<input id="score2" type="number" min="0" max="99" required></label></div><label>Predicted winner<select id="winner" required></select></label><label>Comment / tie-breaker<textarea id="comment" maxlength="300" placeholder="Optional"></textarea></label><button id="submitBtn" class="primary" type="submit">Submit Prediction</button><p id="formMsg" class="msg"></p></form></div><footer>© Your Company • <a href="admin.html">Admin</a></footer><script src="config.js"></script><script src="schedule.js"></script><script src="app.js"></script></body></html>
